<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0;">
    <div style="max-width: 600px; margin: 0 auto; padding: 20px;">
        <div style="background-color: #667eea; color: white; padding: 20px; border-radius: 5px 5px 0 0; text-align: center;">
            <h1 style="margin: 0; font-size: 28px;">Welcome!</h1>
        </div>
        <div style="background-color: white; padding: 20px; border-radius: 0 0 5px 5px; border: 1px solid #e0e0e0; border-top: none;">
            <p style="margin: 0 0 15px 0;">Hello {{ full_name }},</p>
            <p style="margin: 0 0 15px 0;">Your email has been successfully confirmed! You can now access your account and start using all the features.</p>
            <div style="text-align: center; margin: 25px 0;">
                <a href="{{ dashboard_url }}" style="display: inline-block; background-color: #667eea; color: white; padding: 12px 30px; text-decoration: none; border-radius: 5px; font-weight: bold;">Go to Dashboard</a>
            </div>
            <p style="margin: 15px 0; color: #666; font-size: 13px;">If you have any questions, feel free to contact us.</p>
            <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; font-size: 12px; color: #999;">
                <p style="margin: 0;">Email Confirmation System</p>
            </div>
        </div>
    </div>
</body>
</html>
